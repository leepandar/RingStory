# ============================================================
# RingStory 共享配置 (group: RINGSTORY)
# 所有服务自动加载此配置
# ============================================================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:ringstory}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:lida8544903}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:127.0.0.1:9876}
  producer:
    group: ringstory-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 3

# Sentinel 限流
spring.cloud.sentinel:
  transport:
    dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}
    port: 8719
  eager: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deletedAt
      logic-delete-value: now()
      logic-not-delete-value: "null"

logging:
  level:
    root: INFO
    com.ringstory: DEBUG
    com.alibaba.nacos: WARN
