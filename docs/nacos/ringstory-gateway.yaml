# ============================================================
# RingStory Gateway (group: RINGSTORY)
# Data ID: ringstory-gateway.yaml
# ============================================================

spring:
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1}:${SENTINEL_PORT:8718}
      eager: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      routes:
        - id: user
          uri: lb://ringstory-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=0
        - id: family
          uri: lb://ringstory-family
          predicates:
            - Path=/api/family/**
          filters:
            - StripPrefix=0
        - id: album
          uri: lb://ringstory-album
          predicates:
            - Path=/api/album/**,/api/photo/**
          filters:
            - StripPrefix=0
        - id: ringtree
          uri: lb://ringstory-ringtree
          predicates:
            - Path=/api/ringtree/**
          filters:
            - StripPrefix=0
        - id: story
          uri: lb://ringstory-story
          predicates:
            - Path=/api/story/**,/api/note/**
          filters:
            - StripPrefix=0
        - id: review
          uri: lb://ringstory-review
          predicates:
            - Path=/api/review/**
          filters:
            - StripPrefix=0
        - id: search
          uri: lb://ringstory-search
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=0
        - id: notify
          uri: lb://ringstory-notify
          predicates:
            - Path=/api/notification/**
          filters:
            - StripPrefix=0

sa-token:
  token-name: Authorization
  token-style: uuid
  is-logout-clear-login: true
  is-concurrent: true
  is-share: false
  timeout: 86400
  activity-timeout: -1
  is-read-cookie: false
  is-read-header: true
  is-read-body: false

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
