# ============================================================
# RingStory Notify Service (group: RINGSTORY)
# Data ID: ringstory-notify.yaml
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/ringstory_notify?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
  cloud:
    stream:
      rocketmq:
        binder:
          name-server: ${ROCKETMQ_NAMESRV:127.0.0.1:9876}
      bindings:
        notification-out-0:
          destination: ringstory-notification
          content-type: application/json
        notification-in-0:
          destination: ringstory-notification
          group: ringstory-notify-group
          content-type: application/json
