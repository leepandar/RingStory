server:
  port: 8086

spring:
  application:
    name: ringstory-review
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:public}
        group: RINGSTORY
        shared-configs:
          - data-id: ringstory-common.yaml
            group: RINGSTORY
            refresh: true
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: RINGSTORY
