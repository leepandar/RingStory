      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ringstory_notify?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
