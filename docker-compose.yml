version: "3.8"

# ============================================================
#  RingStory 全栈 Docker Compose 编排
#  使用方式：
#    1. 先构建所有后端模块：mvn clean package -DskipTests
#    2. 启动所有服务：docker-compose up -d
#    3. 访问 Nacos 控制台：http://localhost:8848/nacos  (nacos/nacos)
#    4. 访问网关：http://localhost:8080
# ============================================================

networks:
  ringstory-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:

  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.0
    container_name: ringstory-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - ringstory-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ringstory-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass redis123
    networks:
      - ringstory-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 注册/配置中心 ====================

  ringstory-nacos:
    build:
      context: ./ringstory-nacos
    container_name: ringstory-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: ringstory_nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root123
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: ringstory-key
      NACOS_AUTH_IDENTITY_VALUE: ringstory-key
      NACOS_AUTH_TOKEN: UmluZ1N0b3J5U2VjcmV0S2V5Rm9yQXV0aFRva2VuR2VuZXJhdGlvbjIwMjQwNzIw
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ringstory-net

  # ==================== 网关 ====================

  ringstory-gateway:
    build:
      context: ./ringstory-gateway
    container_name: ringstory-gateway
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: ringstory-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ringstory-nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    depends_on:
      - ringstory-nacos
      - redis
    networks:
      - ringstory-net

  # ==================== 用户服务 ====================

  ringstory-user:
    build:
      context: ./ringstory-user
    container_name: ringstory-user
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: ringstory-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ringstory-nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ringstory_user?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8081:8081"
    depends_on:
      - ringstory-nacos
      - mysql
      - redis
    networks:
      - ringstory-net

  # ==================== 家庭服务 ====================

  ringstory-family:
    build:
      context: ./ringstory-family
    container_name: ringstory-family
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: ringstory-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ringstory-nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ringstory_family?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8082:8082"
    depends_on:
      - ringstory-nacos
      - mysql
      - redis
    networks:
      - ringstory-net

  # ==================== 相册服务 ====================

  ringstory-album:
    build:
      context: ./ringstory-album
    container_name: ringstory-album
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: ringstory-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ringstory-nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ringstory_album?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8083:8083"
    depends_on:
      - ringstory-nacos
      - mysql
      - redis
    networks:
      - ringstory-net

  # ==================== 年轮树服务 ====================

  ringstory-ringtree:
    build:
      context: ./ringstory-ringtree
    container_name: ringstory-ringtree
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: ringstory-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ringstory-nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8084:8084"
    depends_on:
      - ringstory-nacos
      - redis
    networks:
      - ringstory-net

  # ==================== 故事服务 ====================

  ringstory-story:
    build:
      context: ./ringstory-story
    container_name: ringstory-story
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: ringstory-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ringstory-nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ringstory_story?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8085:8085"
    depends_on:
      - ringstory-nacos
      - mysql
      - redis
    networks:
      - ringstory-net

  # ==================== 放映室服务 ====================

  ringstory-review:
    build:
      context: ./ringstory-review
    container_name: ringstory-review
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: ringstory-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: ringstory-nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ringstory_review?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
