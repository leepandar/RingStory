      - ringstory-net

  # ==================== 搜索服务 ====================

  ringstory-search:
    build:
      context: ./ringstory-search
    container_name: ringstory-search
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: ringstory-nacos:8848
