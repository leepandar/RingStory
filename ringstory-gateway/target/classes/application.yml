server:
  port: 8080

spring:
  application:
    name: ringstory-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ringstory
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1}:${SENTINEL_PORT:8718}
      eager: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-route
          uri: lb://ringstory-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=0

        - id: family-route
          uri: lb://ringstory-family
          predicates:
            - Path=/api/family/**
          filters:
            - StripPrefix=0

        - id: album-route
          uri: lb://ringstory-album
          predicates:
            - Path=/api/album/**,/api/photo/**
          filters:
            - StripPrefix=0

        - id: ringtree-route
          uri: lb://ringstory-ringtree
          predicates:
            - Path=/api/ringtree/**
          filters:
            - StripPrefix=0

        - id: story-route
          uri: lb://ringstory-story
          predicates:
            - Path=/api/story/**,/api/note/**
          filters:
            - StripPrefix=0

        - id: review-route
          uri: lb://ringstory-review
          predicates:
            - Path=/api/review/**
          filters:
            - StripPrefix=0

        - id: search-route
          uri: lb://ringstory-search
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=0

        - id: notify-route
          uri: lb://ringstory-notify
          predicates:
            - Path=/api/notification/**
          filters:
            - StripPrefix=0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Sa-Token 配置
sa-token:
  token-name: Authorization
  token-style: uuid
  is-logout-clear-login: true
  is-concurrent: true
  is-share: false
  timeout: 86400
  activity-timeout: -1
  is-read-cookie: false
  is-read-header: true
  is-read-body: false

logging:
  level:
    com.alibaba.nacos: WARN
    com.ringstory.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
spring:
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1}:${SENTINEL_PORT:8718}
      eager: true
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
logging:
  level:
    com.alibaba.nacos: WARN
    com.ringstory.gateway: DEBUG
