spring:
  application:
    name: ringstory-user
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:public}
        group: RINGSTORY
        shared-configs:
          - data-id: ringstory-common.yaml
            group: RINGSTORY
            refresh: true
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: RINGSTORY
server:
  port: 8081

sa-token:
  token-name: Authorization
  token-style: uuid
  is-logout-clear-login: true
  is-concurrent: true
  is-share: false
  timeout: 86400
  activity-timeout: -1
  is-read-cookie: false
  is-read-header: true
  is-read-body: false

